<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelola UMKM - Admin Gundih Digital</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
  <!-- Protect page -->
  <script src="../js/auth.js"></script>
  <script>checkAuth();</script>
</head>

<body class="admin-layout">
  <div id="toastContainer"></div>

  <!-- Sidebar -->
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="sidebar-header">
      <span class="material-symbols-outlined" style="margin-right: 8px;">storefront</span> Admin Gundih
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="sidebar-link">
        <span class="material-symbols-outlined">dashboard</span> Dashboard
      </a>
      <a href="kelola-umkm.html" class="sidebar-link active">
        <span class="material-symbols-outlined">groups</span> Kelola UMKM
      </a>
      <a href="kelola-produk.html" class="sidebar-link">
        <span class="material-symbols-outlined">inventory_2</span> Kelola Produk
      </a>
    </nav>
    <div class="sidebar-footer">
      <button id="logoutBtn" class="btn-logout">
        <span class="material-symbols-outlined">logout</span> Logout
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="admin-main">
    <header class="admin-topbar">
      <button id="sidebarToggle" class="sidebar-toggle">
        <span class="material-symbols-outlined">menu</span>
      </button>
      <div class="topbar-user">
        <span class="material-symbols-outlined">account_circle</span>
        <span>Administrator</span>
      </div>
    </header>

    <main class="admin-content">
      <div class="page-header">
        <div>
          <h2>Data UMKM</h2>
          <p class="text-muted">Kelola data mitra UMKM Desa Gundih</p>
        </div>
        <button class="btn btn-primary" data-modal-target="modalTambahUMKM">
          <span class="material-symbols-outlined">add</span> Tambah UMKM
        </button>
      </div>

      <div class="table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>No</th>
              <th>Nama UMKM</th>
              <th>Kategori</th>
              <th>Pemilik</th>
              <th>Alamat</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tabelUmkm">
            <!-- Rendered via JS -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Modal Tambah UMKM -->
  <div class="modal-overlay" id="modalTambahUMKM">
    <div class="modal">
      <div class="modal-header">
        <h3>Tambah Data UMKM</h3>
        <button class="btn-close" data-modal-close>&times;</button>
      </div>
      <form id="formTambahData">
        <input type="hidden" id="umkmId">
        <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
          <div class="form-group">
            <label class="form-label">Nama UMKM</label>
            <input type="text" id="umkmNama" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">Kategori</label>
            <select id="umkmKategori" class="form-control" required>
              <option value="Kuliner">Kuliner</option>
              <option value="Fashion">Fashion</option>
              <option value="Kerajinan">Kerajinan</option>
              <option value="Jasa">Jasa</option>
              <option value="Sembako">Sembako</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Nama Pemilik</label>
            <input type="text" id="umkmPemilik" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">Nomor WhatsApp</label>
            <input type="text" id="umkmWA" class="form-control" placeholder="Contoh: 6281234567890" required>
          </div>
          <div class="form-group">
            <label class="form-label">Alamat</label>
            <textarea id="umkmAlamat" class="form-control" rows="2" required></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Koordinat (Latitude, Longitude)</label>
            <div style="display: flex; gap: 10px;">
              <input type="text" id="umkmLat" class="form-control" placeholder="Latitude (contoh: -7.2575)" required>
              <input type="text" id="umkmLong" class="form-control" placeholder="Longitude (contoh: 112.7521)" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Deskripsi</label>
            <textarea id="umkmDeskripsi" class="form-control" rows="3" required></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">URL Foto</label>
            <input type="text" id="umkmFoto" class="form-control" placeholder="https://..." required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" data-modal-close>Batal</button>
          <button type="submit" class="btn btn-primary">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/database.js"></script>
  <script src="../js/user.js"></script> <!-- For Toast -->
  <script src="../js/admin.js"></script>
</body>

</html>
